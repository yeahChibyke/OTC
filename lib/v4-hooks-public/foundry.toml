[profile.default]
out = 'foundry-out'
auto_detect_solc = true
optimizer_runs = 44444444
via_ir = false
ffi = true
fs_permissions = [{ access = "read-write", path = ".forge-snapshots/" }, { access = "read", path = "foundry-out/" }, { access = "read-write", path = "docs/" }, { access = "read", path = "test/stable/data/" }, { access = "read", path = "test/aggregator-hooks/StableSwapNG/precompiled/" }, { access = "read", path = "test/aggregator-hooks/StableSwap/precompiled/" }]
evm_version = "cancun"
gas_limit = "3000000000"
bytecode_hash = "none"

[profile.debug]
via_ir = false
optimizer_runs = 200

[profile.gas]
gas_limit=30_000_000

[profile.aggregator_hooks]
via_ir = false
optimizer_runs = 200

[fuzz]
runs = 10

[rpc_endpoints]
sepolia = "https://rpc.sepolia.org"
unichain_sepolia = "https://sepolia.unichain.org"
base_sepolia = "https://sepolia.base.org"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
mainnet = "https://mainnet.infura.io/v3/${INFURA_API_KEY}"
tempo_testnet = "https://rpc.moderato.tempo.xyz"
tempo_mainnet = "https://rpc.tempo.xyz"

[lint]
lint_on_build=false